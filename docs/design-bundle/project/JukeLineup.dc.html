<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex; flex-direction:column; gap:13px; height:100%; min-height:0; box-sizing:border-box;">

  <div style="display:flex; align-items:flex-start; justify-content:space-between; gap:12px;">
    <div style="min-width:0;">
      <div style="font-family:var(--font-display); font-weight:700; font-size:16px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-strong); white-space:nowrap;">The Lineup</div>
      <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); margin-top:4px;">{{ streamLabel }} stream · {{ listeners }} listening</div>
    </div>
    <div style="display:flex; align-items:center; gap:11px; flex:none;">
      <span style="display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-faint); white-space:nowrap;">Shuffle<x-import component-from-global-scope="Exit66JukeboxDesignSystem_cf9d10.Switch" checked="{{ shuffle }}" onChange="{{ onToggleShuffle }}" tone="magenta" hint-size="46px,26px"></x-import></span>
      <sc-if value="{{ isPhone }}" hint-placeholder-val="{{ false }}">
        <button aria-label="Close lineup" onClick="{{ onClose }}" style="width:32px; height:32px; flex:none; border:1px solid var(--border-default); background:var(--bg-surface-raised); color:var(--text-muted); border-radius:var(--radius-sm); cursor:pointer; font-size:15px; line-height:1;">✕</button>
      </sc-if>
    </div>
  </div>

  <div style="border:1.5px solid var(--neon-cyan); box-shadow:var(--glow-cyan); border-radius:var(--radius-md); background:var(--bg-inset); padding:12px; display:flex; flex-direction:column; gap:10px; flex:none;">
    <div style="display:flex; align-items:center; gap:12px;">
      <div style="width:46px; height:46px; flex:none; border-radius:var(--radius-sm); background:{{ npCover }}; display:flex; align-items:flex-end; padding:5px; box-sizing:border-box; box-shadow:var(--glow-soft-cyan);"><span style="font-family:var(--font-mono); font-size:9px; font-weight:700; color:rgba(255,255,255,0.88);">{{ npCode }}</span></div>
      <div style="flex:1; min-width:0;">
        <div style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--neon-magenta); margin-bottom:3px; display:flex; align-items:center; gap:6px;"><span style="width:6px; height:6px; border-radius:50%; background:var(--neon-magenta);"></span>Now playing</div>
        <div style="font-family:var(--font-sans); font-weight:600; font-size:14px; color:var(--text-strong); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ npTitle }}</div>
        <div style="font-family:var(--font-sans); font-size:12px; color:var(--text-muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">{{ npArtist }} · {{ npAlbum }}</div>
      </div>
      <div style="display:flex; align-items:flex-end; gap:3px; height:20px; flex:none;">
        <span style="width:3px; height:20px; background:var(--neon-cyan); transform-origin:bottom; animation:e66-eq .5s var(--ease-in-out) infinite alternate;"></span>
        <span style="width:3px; height:20px; background:var(--neon-cyan); transform-origin:bottom; animation:e66-eq .7s var(--ease-in-out) infinite alternate;"></span>
        <span style="width:3px; height:20px; background:var(--neon-cyan); transform-origin:bottom; animation:e66-eq .42s var(--ease-in-out) infinite alternate;"></span>
        <span style="width:3px; height:20px; background:var(--neon-cyan); transform-origin:bottom; animation:e66-eq .62s var(--ease-in-out) infinite alternate;"></span>
      </div>
    </div>
    <div style="position:relative; height:4px; border-radius:var(--radius-pill); background:var(--ink-700);"><div style="position:absolute; left:0; top:0; bottom:0; width:{{ npPct }}; border-radius:var(--radius-pill); background:var(--neon-magenta);"></div></div>
  </div>

  <div style="font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-faint); flex:none;">Up next · {{ upCount }}</div>

  <sc-if value="{{ queueEmpty }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:24px 16px; border:1px dashed var(--border-strong); border-radius:var(--radius-md);">
      <div style="font-family:var(--font-display); font-weight:700; font-size:15px; letter-spacing:0.04em; text-transform:uppercase; color:var(--text-muted);">The floor is yours</div>
      <div style="font-family:var(--font-sans); font-size:13px; color:var(--text-faint); max-width:200px;">Nothing queued. Head to the crate and request the next track.</div>
    </div>
  </sc-if>
  <sc-if value="{{ hasQueue }}" hint-placeholder-val="{{ true }}">
    <div style="flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:8px; margin-right:-6px; padding-right:6px;">
      <sc-for list="{{ queue }}" as="q" hint-placeholder-count="4">
        <x-import component-from-global-scope="Exit66JukeboxDesignSystem_cf9d10.QueueItem" position="{{ q.pos }}" code="{{ q.code }}" title="{{ q.title }}" artist="{{ q.artist }}" requester="{{ q.requester }}" art-tone="{{ q.tone }}" onRemove="{{ q.onRemove }}" hint-size="100%,60px"></x-import>
      </sc-for>
    </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:320,&quot;height&quot;:560}}"></script>
</body>
</html>
